<template>
    <lightning-card title="Order Checkout">
        <div class="slds-p-around_medium">

            <lightning-input
                label="Customer Name"
                value={customerName}
                onchange={handleNameChange}
                required>
            </lightning-input>

            <template if:true={hasItems}>
                <div class="slds-m-top_medium">

                    <template for:each={cartItems} for:item="item">
                        <div key={item.productId} class="slds-box slds-m-bottom_small">

                            <p><strong>{item.productName}</strong></p>

                            <p>Quantity: {item.quantity}</p>

                            <p>Price: ₹{item.price}</p>

                            <p>Total: ₹{item.subtotal}</p>

                        </div>
                    </template>

                    <h2 class="slds-text-heading_medium">
                        Grand Total: ₹{grandTotal}
                    </h2>

                    <lightning-button
                        label="Confirm Order"
                        variant="brand"
                        class="slds-m-top_medium"
                        onclick={handleConfirmOrder}>
                    </lightning-button>

                </div>
            </template>

            <template if:false={hasItems}>
                <p class="slds-m-top_medium">
                    No items available for checkout.
                </p>
            </template>

        </div>
    </lightning-card>
</template>
